<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>EnergyAdvisor - Análise de Energia</title>
    <meta name="description" content="Assistente de IA para análise de fornecedores de energia em Portugal. Compara tarifas e poupa na fatura." />

    <link rel="manifest" href="/manifest.json" />
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="theme-color" content="#0EA5E9" />
    <meta name="application-name" content="EnergyAdvisor" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EnergyAdvisor" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <meta property="og:title" content="EnergyAdvisor" />
    <meta property="og:description" content="Compara fornecedores de energia e poupa na fatura" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <style>
      html, body { background: #020B18; margin: 0; padding: 0; overscroll-behavior: none; }
      body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
      #root { min-height: 100vh; }
      .pwa-splash {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #020B18; z-index: 9999;
        flex-direction: column; gap: 16px;
      }
      .pwa-splash-icon {
        width: 80px; height: 80px;
        background: linear-gradient(135deg, #0EA5E9, #6366F1);
        border-radius: 22px;
        display: flex; align-items: center; justify-content: center;
        font-size: 40px; box-shadow: 0 0 40px rgba(14,165,233,0.4);
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.95); opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="pwa-splash">
        <div class="pwa-splash-icon">⚡</div>
        <div style="color: #475569; font-family: system-ui; font-size: 13px; letter-spacing: 0.05em;">EnergyAdvisor</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
